<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600" fill="none">
  <!-- Background -->
  <rect width="400" height="600" fill="#0d0f14"/>

  <!-- Subtle grid/noise texture overlay -->
  <rect width="400" height="600" fill="url(#grid)" opacity="0.04"/>
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#ffffff" stroke-width="0.5"/>
    </pattern>
  </defs>

  <!-- Broken image icon group, centered -->
  <g transform="translate(200, 260)">
    <!-- Outer frame of "image" icon -->
    <rect x="-60" y="-52" width="120" height="104" rx="10" ry="10" stroke="#22d3ee" stroke-width="2.5" stroke-opacity="0.35" fill="none"/>

    <!-- Mountain / landscape inside frame (broken image symbol) -->
    <polyline points="-42,28 -14,-12 10,14 26,-6 42,28" stroke="#22d3ee" stroke-width="2.5" stroke-opacity="0.5" fill="none" stroke-linejoin="round" stroke-linecap="round"/>

    <!-- Sun circle (top-left inside frame) -->
    <circle cx="-30" cy="-22" r="10" stroke="#22d3ee" stroke-width="2.5" stroke-opacity="0.5" fill="none"/>

    <!-- Diagonal slash across frame (broken / not available) -->
    <line x1="-56" y1="-48" x2="56" y2="48" stroke="#22d3ee" stroke-width="2" stroke-opacity="0.25" stroke-linecap="round"/>
  </g>

  <!-- "NO IMAGE" label -->
  <text
    x="200"
    y="350"
    text-anchor="middle"
    font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-size="13"
    font-weight="700"
    letter-spacing="4"
    fill="#22d3ee"
    fill-opacity="0.5"
  >NO IMAGE</text>

  <!-- "AVAILABLE" sub-label -->
  <text
    x="200"
    y="372"
    text-anchor="middle"
    font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-size="11"
    font-weight="400"
    letter-spacing="3"
    fill="#ffffff"
    fill-opacity="0.2"
  >AVAILABLE</text>
</svg>
